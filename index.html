<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Free AI Chat - No Keys, No Heavy Downloads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #e2e8f0;
    }
    .app {
      width: 100%;
      max-width: 600px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .header {
      padding: 0.8rem 1rem;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .header span {
      font-size: 1.1rem;
      font-weight: 600;
      color: #38bdf8;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .message {
      display: flex;
      gap: 0.5rem;
      max-width: 90%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.7rem;
      flex-shrink: 0;
    }
    .user .avatar { background: #2563eb; }
    .assistant .avatar { background: #0d9488; }
    .bubble {
      padding: 0.6rem 0.8rem;
      border-radius: 12px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .user .bubble { background: #2563eb; }
    .assistant .bubble { background: #1e293b; border: 1px solid #475569; }
    .input-area {
      padding: 0.6rem 1rem;
      border-top: 1px solid #334155;
      background: #0f172a;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 0.6rem;
      color: #e2e8f0;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 80px;
      min-height: 36px;
    }
    .input-area button {
      background: #38bdf8;
      border: none;
      color: #0f172a;
      font-weight: 600;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
    }
    .input-area button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .loader {
      display: inline-flex;
      gap: 4px;
    }
    .loader span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out both;
    }
    .loader span:nth-child(1) { animation-delay: -0.32s; }
    .loader span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span>🤖 Free AI Phone Chat</span>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="message assistant">
        <div class="avatar">AI</div>
        <div class="bubble">Hi! I'm a free, no‑key AI assistant. Ask me anything.</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Type a message..." rows="1" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // ---- Hugging Face free model (no API key required) ----
    const API_URL = 'https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium';

    // Conversation history – each entry is "User: ..." or "Assistant: ..."
    let dialogue = ["Assistant: Hi! I'm a free, no‑key AI assistant. Ask me anything.\n"];

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function autoResize(ta) {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 80) + 'px';
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="avatar">${role === 'user' ? 'U' : 'AI'}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function sendMessage() {
      const prompt = userInput.value.trim();
      if (!prompt) return;

      userInput.disabled = true;
      sendBtn.disabled = true;
      userInput.value = '';
      addMessage('user', prompt);

      // Append user turn to dialogue history
      dialogue.push(`User: ${prompt}\nAssistant:`);
      // Build the full prompt by joining history (DialoGPT expects this format)
      const fullPrompt = dialogue.join('');

      // Show loading indicator
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message assistant';
      loadingDiv.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble"><div class="loader"><span></span><span></span><span></span></div></div>
      `;
      chatArea.appendChild(loadingDiv);
      chatArea.scrollTop = chatArea.scrollHeight;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            inputs: fullPrompt,
            parameters: {
              max_new_tokens: 200,
              temperature: 0.85,
              top_p: 0.9,
              do_sample: true,
              return_full_text: false
            }
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(errText || `HTTP ${response.status}`);
        }

        const result = await response.json();
        // DialoGPT returns a list, take the first generated text
        let generated = result[0]?.generated_text?.trim() || "(no response)";

        // Remove loading indicator
        loadingDiv.remove();

        // Sometimes DialoGPT might prepend "Assistant:" or extra spaces; clean it
        generated = generated.replace(/^Assistant:\s*/i, '').trim();

        // Save and display
        dialogue.push(` ${generated}\n`);  // the space after "Assistant:" is already in the prompt, so just add reply + newline
        addMessage('assistant', generated);
      } catch (error) {
        loadingDiv.remove();
        addMessage('assistant', `⚠️ Error: ${error.message}. Free tier may be busy – try again soon.`);
        // Remove the incomplete assistant turn
        dialogue.pop(); // remove the "Assistant:" we added
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
        autoResize(userInput);
      }
    }

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
