<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Assistant (Zero API Keys)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .app { width: 100%; max-width: 800px; height: 90vh; display: flex; flex-direction: column; background: #1e293b; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
    .header { padding: 1.2rem 1.5rem; background: #0f172a; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; }
    .title { font-size: 1.4rem; font-weight: 600; color: #38bdf8; }
    .model-selector { display: flex; align-items: center; gap: 0.5rem; }
    .model-selector label { font-weight: 500; font-size: 0.9rem; color: #94a3b8; }
    .model-selector select { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.9rem; cursor: pointer; outline: none; }
    .chat-area { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
    .message { display: flex; gap: 0.8rem; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; flex-shrink: 0; }
    .user .avatar { background: #2563eb; color: white; }
    .assistant .avatar { background: #0d9488; color: white; }
    .content { background: #334155; padding: 0.8rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .user .content { background: #2563eb; }
    .assistant .content { background: #1e293b; border: 1px solid #475569; }
    .input-area { padding: 1.2rem 1.5rem; border-top: 1px solid #334155; background: #0f172a; display: flex; gap: 0.8rem; align-items: center; }
    .input-area textarea { flex: 1; background: #1e293b; border: 1px solid #475569; border-radius: 10px; padding: 0.8rem; color: #e2e8f0; font-size: 1rem; resize: none; outline: none; max-height: 120px; min-height: 44px; }
    .input-area button { background: #38bdf8; border: none; color: #0f172a; font-weight: 600; padding: 0.8rem 1.4rem; border-radius: 10px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
    .input-area button:disabled { background: #475569; cursor: not-allowed; }
    .input-area button:hover:not(:disabled) { background: #0ea5e9; }
    .typing-indicator { display: inline-flex; gap: 4px; padding: 0.5rem 0; }
    .typing-indicator span { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    .system-message { text-align: center; color: #64748b; font-size: 0.85rem; margin-top: auto; }
    @media (max-width: 600px) {
      .app { height: 100vh; border-radius: 0; }
      .input-area { flex-direction: column; }
      .input-area button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="title">🤖 FreeAI Chat</span>
      <div class="model-selector">
        <label for="model">Model:</label>
        <select id="model">
          <option value="phind-70b">Phind-70B (Free)</option>
        </select>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="system-message">Your free AI assistant – no API key needed ✨</div>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Ask anything..." rows="1" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    // ---------- Configuration ----------
    const PROXY_URL = 'https://corsproxy.io/?';  // Free public CORS proxy
    const PHIND_API = 'https://https.phind.com/agent/';

    // Store conversation history for context
    let chatHistory = [];

    // DOM elements
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Auto-resize textarea
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    // Add a message to the chat UI
    function addMessage(role, text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.innerHTML = `
        <div class="avatar">${role === 'user' ? 'U' : 'AI'}</div>
        <div class="content">${escapeHtml(text)}</div>
      `;
      // Remove system message if present
      const sysMsg = chatArea.querySelector('.system-message');
      if (sysMsg) sysMsg.remove();
      chatArea.appendChild(messageDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
      return messageDiv;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Update the last assistant message (while streaming)
    function updateLastAssistant(text) {
      const messages = chatArea.querySelectorAll('.message.assistant');
      const lastMsg = messages[messages.length - 1];
      if (lastMsg) {
        const content = lastMsg.querySelector('.content');
        if (content) content.innerHTML = escapeHtml(text);
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    // Create typing indicator
    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="avatar">AI</div>
        <div class="content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
      `;
      chatArea.appendChild(typingDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typingIndicator');
      if (typing) typing.remove();
    }

    // Format today's date for Phind API
    function getFormattedDate() {
      const d = new Date();
      return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    }

    // Send message to Phind via CORS proxy
    async function sendToPhind(userPrompt) {
      const requestBody = {
        userInput: userPrompt,
        chatHistory: chatHistory,
        options: {
          skill: "intermediate",
          date: getFormattedDate(),
          language: "en-US"
        }
      };

      // Note: the CORS proxy adds the target URL as a query parameter.
      // The proxy will forward method, headers and body to that URL.
      const url = PROXY_URL + encodeURIComponent(PHIND_API);

      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(requestBody),
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      return response.body;
    }

    // Process the SSE stream from Phind
    async function processStream(stream) {
      const reader = stream.getReader();
      const decoder = new TextDecoder();
      let assistantMessage = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        // Keep the last incomplete line in buffer
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const jsonStr = line.substring(6).trim();
            if (!jsonStr) continue;
            try {
              const data = JSON.parse(jsonStr);
              // Check for the answer chunks
              if (data.type === 'answer' && data.text) {
                assistantMessage += data.text;
                updateLastAssistant(assistantMessage);
              }
              // Ignore other message types (like 'metadata', 'status')
            } catch (e) {
              // Skip malformed JSON
            }
          }
        }
      }
      return assistantMessage;
    }

    // Main send function
    async function sendMessage() {
      const prompt = userInput.value.trim();
      if (!prompt) return;

      // Disable UI
      sendBtn.disabled = true;
      userInput.disabled = true;
      userInput.value = '';

      // Add user message
      addMessage('user', prompt);

      // Update chat history (Phind expects exactly this format)
      chatHistory.push({ role: 'user', content: prompt });

      // Show typing indicator
      showTyping();

      try {
        const stream = await sendToPhind(prompt);
        removeTyping();
        // Add a placeholder assistant message to update
        addMessage('assistant', '');
        const fullResponse = await processStream(stream);
        // After stream ends, final update
        updateLastAssistant(fullResponse);
        // Add assistant response to history
        chatHistory.push({ role: 'assistant', content: fullResponse });
      } catch (error) {
        removeTyping();
        addMessage('assistant', `⚠️ Error: ${error.message}. Please try again.`);
        console.error('API Error:', error);
      } finally {
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
        autoResize(userInput);
      }
    }

    // Send on Enter (shift+Enter for new line)
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
